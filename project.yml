name: ClearCue
options:
  bundleIdPrefix: com.jamesangrellera
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: 3WG2K4XBS6
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: 1.0.0
targets:
  ClearCue:
    type: application
    platform: iOS
    sources:
      - path: ClearCue
    postBuildScripts:
      - name: Embed temporary OpenAI key
        path: Scripts/embed-openai-key.sh
        basedOnDependencyAnalysis: false
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
        product: WhisperKit
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - target: MochiWatch
        embed: true
    entitlements:
      path: ClearCue/ClearCue.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: ClearCue/Info.plist
      properties:
        CFBundleDisplayName: Mochi
        UILaunchScreen:
          UIColorName: LaunchBackground
        NSMicrophoneUsageDescription: Mochi uses the microphone only during a conversation you explicitly start, so it can create live captions and a local recording.
        NSSpeechRecognitionUsageDescription: Mochi uses speech recognition for live caption previews in the iOS Simulator. Physical iPhones use on-device Whisper.
        NSHealthShareUsageDescription: Mochi reads your latest hearing-test audiogram only when you ask, so you can understand which Apple hearing features may fit your needs.
        ClearCueAPIBaseURL: http://127.0.0.1:8787
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: false
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesangrellera.clearcue
        PRODUCT_NAME: ClearCue
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  MochiWatch:
    type: application
    platform: watchOS
    sources:
      - path: MochiWatch
    dependencies:
      - sdk: WatchConnectivity.framework
    info:
      path: MochiWatch/Info.plist
      properties:
        CFBundleDisplayName: Mochi
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.jamesangrellera.clearcue
        WKRunsIndependentlyOfCompanionApp: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesangrellera.clearcue.watchkitapp
        PRODUCT_NAME: MochiWatch
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: true
  ClearCueTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClearCueTests
    dependencies:
      - target: ClearCue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesangrellera.clearcue.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  ClearCue:
    build:
      targets:
        ClearCue: all
        MochiWatch: all
        ClearCueTests: [test]
    test:
      targets:
        - ClearCueTests
  MochiWatch:
    build:
      targets:
        MochiWatch: all
    run:
      config: Debug
